<div class="company-type-page">
  <div class="onboarding-content-container">
    <app-step-navigation [steps]="steps()"></app-step-navigation>
    <div class="card">
      <div class="card-header">
        <div>
          <h3 class="card-title">{{ 'onboarding.companyType.title' | translate }}</h3>
          <p class="card-subtitle">{{ 'onboarding.companyType.subtitle' | translate }}</p>
        </div>
        <div class="header-actions">
          @if (selectedType) {
            <app-onboarding-continue-button
              (click)="proceed()"
              data-test="continue-button"
            ></app-onboarding-continue-button>
          }
        </div>
      </div>
      <div class="card-body">
        <div class="type-options">
          @for (type of companyTypes; track type.id) {
            <button
              class="selection-option type-option"
              [class.selected]="selectedType === type.id"
              (click)="selectType(type.id)"
              [attr.data-test]="type.id + '-option'"
            >
              <mat-icon class="selection-option__icon">{{ type.icon }}</mat-icon>
              <span class="selection-option__label">{{ type.labelKey | translate }}</span>
              @if (selectedType === type.id) {
                <mat-icon class="selection-option__check">check_circle</mat-icon>
              }
            </button>
          }
        </div>
      </div>
    </div>

    <button mat-stroked-button class="secondary-button" (click)="goBack()" data-test="back-button">
      <mat-icon>arrow_back</mat-icon>
      {{ 'generic.back' | translate }}
    </button>
  </div>
</div>
